<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Overlay Effect</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap");
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: "Plus Jakarta Sans", sans-serif;
      }

      #effect {
        position: fixed;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      /* ========================= */
      /* 😡 ANGRY */
      /* ========================= */
      /* 🔴 ANGRY BACKGROUND */
      .angry {
        background: radial-gradient(circle, rgba(255, 0, 0, 0.4), rgba(80, 0, 0, 0.8));
        animation: rageShake 0.05s infinite;
        backdrop-filter: contrast(1.5) brightness(0.7);
      }

      @keyframes rageShake {
        0% {
          transform: translate(4px, 2px) rotate(0.3deg);
        }
        25% {
          transform: translate(-4px, -2px) rotate(-0.3deg);
        }
        50% {
          transform: translate(3px, -3px) rotate(0.2deg);
        }
        75% {
          transform: translate(-3px, 3px) rotate(-0.2deg);
        }
        100% {
          transform: translate(4px, -2px) rotate(0.3deg);
        }
      }

      /* 🔥 FIRE */
      .fire {
        position: absolute;
        bottom: 0;
        background: linear-gradient(to top, yellow, orange, red);
        border-radius: 50%;
        filter: blur(2px);
        animation: fireRise linear infinite;
      }

      @keyframes fireRise {
        from {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
        to {
          transform: translateY(-300px) scale(0.5);
          opacity: 0;
        }
      }

      /* 💥 SPARK */
      .spark {
        position: absolute;
        width: 4px;
        height: 4px;
        background: orange;
        border-radius: 50%;
        box-shadow: 0 0 8px red;
        animation: sparkMove linear infinite;
      }

      @keyframes sparkMove {
        from {
          transform: translateY(0);
          opacity: 1;
        }
        to {
          transform: translateY(-150px);
          opacity: 0;
        }
      }

      /* ========================= */
      /* 😭 SAD */
      /* ========================= */
      .sad {
        background: #001c47;
        background: linear-gradient(-180deg, rgba(0, 28, 71, 1) 0%, rgba(255, 226, 8, 0) 100%);
      }
      .rain-drop {
        position: absolute;
        width: 2px;
        height: 20px;
        background: rgba(173, 216, 230, 0.7);
        animation: rainFall 0.6s linear infinite;
      }

      @keyframes rainFall {
        from {
          transform: translateY(-100px);
        }
        to {
          transform: translateY(100vh);
        }
      }

      /* ========================= */
      /* 😄 HAPPY */
      /* ========================= */
      .confetti {
        position: absolute;
        top: -20px;
        animation: fall linear forwards;
      }

      @keyframes fall {
        0% {
          transform: translateY(-50px) rotate(0deg);
        }
        100% {
          transform: translateY(100vh) rotate(720deg);
        }
      }

      @keyframes burst {
        0% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1);
        }
        100% {
          opacity: 0;
          transform: translate(calc(-50% + 400px * cos(1rad)), calc(-50% + 400px * sin(1rad))) scale(0.5);
        }
      }

      /* ========================= */
      /* 😴 LAZY */
      /* ========================= */
      .zzz {
        position: absolute;
        color: rgba(255, 255, 255, 0.8);
        font-weight: bold;
        animation: floatUp ease-in-out infinite;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
      }

      @keyframes floatUp {
        0% {
          transform: translateY(0px) translateX(0px);
          opacity: 0;
        }
        25% {
          opacity: 1;
        }
        50% {
          transform: translateY(-50px) translateX(10px);
        }
        75% {
          transform: translateY(-120px) translateX(-10px);
        }
        100% {
          transform: translateY(-200px) translateX(0px);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="effect"></div>

    <script>
      $(function () {
        const ws = new WebSocket("ws://localhost:3000");

        ws.onmessage = function (event) {
          const data = JSON.parse(event.data);
          if (data.type === "emotion") {
            triggerEffect(data.emotion, data.duration || 3000);
          }
        };

        function triggerEffect(type, duration) {
          const container = $("#effect");
          container.empty().removeClass().addClass(type);

          if (type === "angry") {
            container.addClass("angry");

            // 🔥 API BESAR
            for (let i = 0; i < 150; i++) {
              const fire = $("<div>").addClass("fire");

              fire.css({
                left: Math.random() * 100 + "%",
                width: 8 + Math.random() * 20 + "px",
                height: 30 + Math.random() * 80 + "px",
                animationDuration: 0.6 + Math.random() * 0.6 + "s",
                animationDelay: Math.random() * 0.5 + "s",
                opacity: 0.6 + Math.random() * 0.4,
              });

              container.append(fire);
            }

            // 💥 SPARKS
            for (let i = 0; i < 120; i++) {
              const spark = $("<div>").addClass("spark");

              spark.css({
                left: Math.random() * 100 + "%",
                top: Math.random() * 100 + "%",
                animationDuration: 0.5 + Math.random() * 0.8 + "s",
                animationDelay: Math.random() * 0.5 + "s",
              });

              container.append(spark);
            }
          }

          if (type === "sad") {
            for (let i = 0; i < 100; i++) {
              const drop = $("<div>").addClass("rain-drop");
              drop.css({
                left: Math.random() * 100 + "%",
                animationDuration: 0.5 + Math.random() + "s",
              });
              container.append(drop);
            }
          }

          if (type === "happy") {
            for (let i = 0; i < 350; i++) {
              const confetti = $("<div>").addClass("confetti");

              const size = 6 + Math.random() * 14;
              const leftPos = Math.random() * 100;
              const duration = 2 + Math.random() * 3;
              const delay = Math.random() * 1.5;

              confetti.css({
                left: leftPos + "%",
                width: size + "px",
                height: size + "px",
                background: "hsl(" + Math.random() * 360 + ",100%,50%)",
                animationDuration: duration + "s",
                animationDelay: delay + "s",
                borderRadius: Math.random() > 0.5 ? "50%" : "0%",
                transform: "rotate(" + Math.random() * 360 + "deg)",
                boxShadow: "0 0 8px rgba(255,255,255,0.6)",
              });

              container.append(confetti);
            }

            // Tambah burst tengah
            for (let i = 0; i < 80; i++) {
              const burst = $("<div>").addClass("confetti");

              const size = 8 + Math.random() * 18;
              const angle = Math.random() * 360;
              const distance = 200 + Math.random() * 400;

              burst.css({
                left: "50%",
                top: "50%",
                width: size + "px",
                height: size + "px",
                background: "hsl(" + Math.random() * 360 + ",100%,50%)",
                borderRadius: "50%",
                position: "absolute",
                transform: "translate(-50%,-50%) rotate(" + angle + "deg)",
                animation: "burst 1.2s ease-out forwards",
              });

              burst.data("angle", angle);
              burst.data("distance", distance);

              container.append(burst);
            }
          }

          if (type === "lazy") {
            for (let i = 0; i < 40; i++) {
              const z = $("<div>").addClass("zzz").text("Zzz");

              z.css({
                left: Math.random() * 100 + "%",
                top: Math.random() * 100 + "%",
                fontSize: 20 + Math.random() * 60 + "px",
                animationDuration: 2 + Math.random() * 4 + "s",
                animationDelay: Math.random() * 2 + "s",
                opacity: 0.3 + Math.random() * 0.7,
              });

              container.append(z);
            }
          }

          setTimeout(() => {
            container.fadeOut(500, function () {
              container.empty().removeClass().show();
            });
          }, duration);
        }
      });
    </script>
  </body>
</html>
