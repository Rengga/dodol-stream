<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Reaction Panel</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  </head>

  <body class="" style="background-color: #f3f4f4">
    <nav class="navbar navbar-expand-lg bg-body-tertiary mb-2">
      <div class="container-fluid">
        <a class="navbar-brand w-100 text-center btn bg-warning" href="http://localhost:3000/reactControl.html">React</a>
        <a class="navbar-brand w-100 text-center" href="http://localhost:3000/emotionControl.html">Emotion</a>
        <a class="navbar-brand w-100 text-center" href="http://localhost:3000/vibeControl.html">Vibe</a>
        <a class="navbar-brand w-100 text-center" href="http://localhost:3000/lyricControl.html">Lyric</a>
      </div>
    </nav>
    <div class="container py-3 py-md-4">
      <div class="text-center text-md-start mb-4">
        <h3 class="fw-bold mb-2">Reaction Panel</h3>
        <a class="p-2 text-black text-center btn bg-warning mb-2" href="http://localhost:3000/reactOverlay.html" target="_blank">Overlay</a>
        <p class="text-muted mb-0 small">Klik gambar untuk tampil di overlay</p>
      </div>

      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <div class="row g-2">
            <div class="col-12 col-md-8">
              <input type="file" id="imageInput" class="form-control" accept="image/*" />
            </div>
            <div class="col-12 col-md-4">
              <button id="uploadBtn" class="btn btn-primary w-100">Upload Gambar</button>
            </div>
          </div>
        </div>
      </div>

      <div class="row g-3" id="buttons"></div>
    </div>

    <script>
      $(function () {
        const ws = new WebSocket("ws://localhost:3000");
        const container = $("#buttons");

        function loadImages() {
          container.empty();
          $.get("/images", function (files) {
            files.forEach((filename) => {
              addCard(filename);
            });
          });
        }

        function addCard(filename) {
          const col = $("<div>").addClass("col-3 col-md-2");

          const card = $(`
      <div class="card h-auto shadow-sm border-0">
        <div class="ratio ratio-1x1">
          <img src="assets/${filename}" 
               class="img-fluid object-fit-cover rounded-top"
               style="cursor:pointer;">
        </div>
        <div class="card-body p-2">
          <button class="btn btn-danger btn-sm w-100">
            Hapus
          </button>
        </div>
      </div>
    `);

          // Klik gambar kirim ke overlay
          card.find("img").on("click", function () {
            ws.send(
              JSON.stringify({
                type: "reaction",
                image: `assets/${filename}`,
              })
            );
          });

          // Hapus gambar
          card.find("button").on("click", function () {
            if (!confirm("Hapus gambar ini?")) return;

            $.ajax({
              url: `/images/${filename}`,
              type: "DELETE",
              success: function () {
                col.remove();
              },
            });
          });

          col.append(card);
          container.append(col);
        }

        $("#uploadBtn").on("click", function () {
          const file = $("#imageInput")[0].files[0];
          if (!file) return alert("Pilih gambar dulu");

          const formData = new FormData();
          formData.append("image", file);

          $.ajax({
            url: "/upload",
            type: "POST",
            data: formData,
            contentType: false,
            processData: false,
            success: function (res) {
              addCard(res.filename);
              $("#imageInput").val("");
            },
          });
        });

        loadImages();
      });
    </script>
  </body>
</html>
