<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Vibe Control Panel</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
      body {
        background: #111;
      }
      .vibe-btn {
        font-weight: bold;
      }
    </style>
  </head>
  <body class="text-light">
    <nav class="navbar navbar-expand-lg bg-body-tertiary mb-2">
      <div class="container-fluid">
        <a class="navbar-brand w-100 text-center" href="http://localhost:3000/reactControl.html">React</a>
        <a class="navbar-brand w-100 text-center" href="http://localhost:3000/emotionControl.html">Emotion</a>
        <a class="navbar-brand w-100 text-center btn bg-warning" href="http://localhost:3000/vibeControl.html">Vibe</a>
        <a class="navbar-brand w-100 text-center" href="http://localhost:3000/lyricControl.html">Lyric</a>
      </div>
    </nav>
    <div class="container py-2">
      <h1 class="mb-2">🎛️ Vibe Control Panel</h1>
      <a class="p-2 text-black text-center btn bg-warning mb-2" href="http://localhost:3000/vibeOverlay.html" target="_blank">Overlay</a>

      <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
          <button class="btn btn-info w-100 vibe-btn" data-mode="underwater">🌊 Underwater</button>
        </div>

        <div class="col-6 col-md-3">
          <button class="btn btn-danger w-100 vibe-btn" data-mode="metal">🤘 Metal Concert</button>
        </div>

        <div class="col-6 col-md-3">
          <button class="btn btn-secondary w-100 vibe-btn" data-mode="jazz">🎷 Jazz Lounge</button>
        </div>

        <div class="col-6 col-md-3">
          <button class="btn btn-pink w-100 vibe-btn text-white" style="background: #ff69b4" data-mode="idol">🌸 Idol Stage</button>
        </div>
      </div>

      <div class="text-center mb-5">
        <button class="btn btn-outline-light btn-lg" id="stopBtn">❌ STOP</button>
      </div>

      <div class="card bg-dark border-secondary">
        <div class="card-body">
          <h5 class="card-title mb-3 text-white">Mode Durasi</h5>

          <div class="form-check">
            <input class="form-check-input" type="radio" name="durasiMode" value="timed" checked />
            <label class="form-check-label"> ⏱ Berdurasi </label>
          </div>

          <div class="form-check">
            <input class="form-check-input" type="radio" name="durasiMode" value="infinite" />
            <label class="form-check-label"> ♾ Tanpa Waktu </label>
          </div>

          <div class="mt-1">
            <label class="form-label">Durasi (ms)</label>
            <input type="number" class="form-control" id="duration" value="5000" />
          </div>
        </div>
      </div>
    </div>

    <script>
      $(function () {
        const ws = new WebSocket("ws://localhost:3000");

        ws.onopen = function () {
          console.log("Connected to server");
        };

        $(".vibe-btn").click(function () {
          const mode = $(this).data("mode");
          const durasiMode = $("input[name='durasiMode']:checked").val();
          let duration = null;

          if (durasiMode === "timed") {
            duration = parseInt($("#duration").val()) || 5000;
          }

          ws.send(
            JSON.stringify({
              type: "vibe",
              mode: mode,
              duration: duration,
            })
          );

          console.log("Sent:", mode, duration);
        });

        $("#stopBtn").click(function () {
          ws.send(
            JSON.stringify({
              type: "vibe",
              mode: "stop",
            })
          );
        });
      });
    </script>
  </body>
</html>
