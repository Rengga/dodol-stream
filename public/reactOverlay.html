<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
        overflow: hidden;
        width: 100%;
        height: 100%;
      }

      #overlay {
        position: fixed;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        pointer-events: none;
      }

      #overlay img {
        width: 400px;
        animation: bounce 0.5s ease;
      }

      @keyframes bounce {
        0% {
          transform: scale(0.8);
        }
        50% {
          transform: scale(1.2);
        }
        70% {
          transform: scale(0.95);
        }
        100% {
          transform: scale(1);
        }
      }
    </style>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  </head>

  <body>
    <div id="overlay"></div>

    <script>
      $(function () {
        const ws = new WebSocket("ws://localhost:3000");

        ws.onmessage = (event) => {
          const data = JSON.parse(event.data);
          console.log("Received:", data);

          if (data.type === "reaction") {
            showImage(data.image, data.duration || 3000);
          }
        };

        function showImage(src, duration) {
          const container = $("#overlay");

          container.stop(true, true);

          container.find("img").each(function () {
            $(this).attr("src", "");
            $(this).remove();
          });

          const img = $("<img>").attr("src", src + "?t=" + Date.now());

          container.append(img);

          setTimeout(() => {
            img.fadeOut(200, function () {
              $(this).attr("src", "");
              $(this).remove();
            });
          }, duration);
        }
      });
    </script>
  </body>
</html>
