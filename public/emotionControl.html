<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Emotion Control Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  </head>

  <body class="bg-dark text-white">
    <nav class="navbar navbar-expand-lg bg-body-tertiary mb-2">
      <div class="container-fluid">
        <a class="navbar-brand w-100 text-center" href="http://localhost:3000/reactControl.html">React</a>
        <a class="navbar-brand w-100 text-center btn bg-warning" href="http://localhost:3000/emotionControl.html">Emotion</a>
        <a class="navbar-brand w-100 text-center" href="http://localhost:3000/vibeControl.html">Vibe</a>
        <a class="navbar-brand w-100 text-center" href="http://localhost:3000/lyricControl.html">Lyric</a>
      </div>
    </nav>
    <div class="container py-4 text-center">
      <h3 class="mb-2">Emotion Control</h3>
      <a class="p-2 text-black text-center btn bg-warning mb-2" href="http://localhost:3000/emotionOverlay.html" target="_blank">Overlay</a>

      <div class="row g-3">
        <div class="col-6 col-md-3">
          <button class="btn btn-danger w-100 emotion-btn" data-emotion="angry">😡 Marah</button>
        </div>

        <div class="col-6 col-md-3">
          <button class="btn btn-primary w-100 emotion-btn" data-emotion="sad">😭 Nangis</button>
        </div>

        <div class="col-6 col-md-3">
          <button class="btn btn-success w-100 emotion-btn" data-emotion="happy">😄 Happy</button>
        </div>

        <div class="col-6 col-md-3">
          <button class="btn btn-secondary w-100 emotion-btn" data-emotion="lazy">😴 Malas</button>
        </div>
      </div>

      <div class="mt-4">
        <label>Durasi (ms)</label>
        <input type="number" id="duration" class="form-control text-center" value="3000" />
      </div>
    </div>

    <script>
      $(function () {
        const ws = new WebSocket("ws://localhost:3000");

        $(".emotion-btn").click(function () {
          const emotion = $(this).data("emotion");
          const duration = parseInt($("#duration").val()) || 3000;

          ws.send(
            JSON.stringify({
              type: "emotion",
              emotion: emotion,
              duration: duration,
            })
          );
        });
      });
    </script>
  </body>
</html>
